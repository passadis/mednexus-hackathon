version: "3.9"

services:
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data/intake:/app/data/intake
    depends_on:
      - cosmos-emulator

  ui:
    build:
      context: ./ui
      dockerfile: ../Dockerfile.ui
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://api:8000
    volumes:
      - ./ui:/app
      - /app/node_modules

  cosmos-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    ports:
      - "8081:8081"
      - "10250-10255:10250-10255"
    environment:
      - AZURE_COSMOS_EMULATOR_PARTITION_COUNT=10
      - AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE=true
